<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<form id="jobForm" onsubmit="return validateForm()">

<!-- Personal Information -->
<fieldset>

<legend>Personal Information</legend>

<div class="mb-3">
<label for="fullname" class="form-label">Full Name</label>
<input type="text" id="fullname" name="fullname" class="form-control" placeholder="Enter your full name">
</div>

<div class="mb-3">
<label for="email" class="form-label">Email Address</label>
<input type="email" id="email" name="email" class="form-control" placeholder="Enter your email">
</div>

<div class="mb-3">
<label for="telephone" class="form-label">Telephone Number</label>
<input type="tel" id="telephone" name="telephone" class="form-control" placeholder="Enter your phone number">
</div>

<div class="mb-3">
<label for="address" class="form-label">Physical Address</label>
<input type="text" id="address" name="address" class="form-control">
</div>

</fieldset>


<!-- Position Information -->
<fieldset>

<legend>Position Information</legend>

<div class="mb-3">

<label for="jobtitle" class="form-label">Desired Job Title</label>

<select id="jobtitle" name="jobtitle" class="form-control">

<option value="">Select Job Title</option>
<option value="webdeveloper">Web Developer</option>
<option value="softwareengineer">Software Engineer</option>
<option value="systemadmin">System Administrator</option>
<option value="itsupport">IT Support</option>

</select>

</div>


<label class="form-label">Employment Type</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="ptcontract">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="ptpermanent">
<label class="form-check-label">Part-time Permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="ftcontract">
<label class="form-check-label">Full-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="ftpermanent">
<label class="form-check-label">Full-time Permanent</label>
</div>

</fieldset>


<!-- Area of Interest -->
<fieldset>

<legend>Area(s) of Interest</legend>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest" value="account">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest" value="business">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest" value="inside">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest" value="manager">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest" value="vp">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<!-- Relocation -->
<fieldset>

<legend>Relocation</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocation" value="yes">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocation" value="no">
<label class="form-check-label">No</label>
</div>

</fieldset>


<!-- Additional Message -->
<fieldset>

<legend>Additional Message</legend>

<div class="mb-3">
<label for="message" class="form-label">Why are you suitable for the role?</label>

<textarea id="message" name="message" rows="4" class="form-control"></textarea>

</div>

</fieldset>


<!-- Buttons -->

<div class="text-center">

<button type="submit" class="btn btn-primary">
Submit Application
</button>

<button type="reset" class="btn btn-secondary">
Reset Form
</button>

</div>

</form>

</div>


<!-- JavaScript -->
<script src="script.js"></script>

</body>

</html>
